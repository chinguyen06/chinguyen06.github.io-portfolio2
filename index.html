<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0d0d0d;
      color: #f5f5f5;
      font-family: "Courier New", monospace;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 20px;
    }

    .title {
      text-align: center;
      color: #ffb703;
      text-shadow: 0 0 10px #ffb703;
      margin-bottom: 40px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .skill {
      border: 2px solid #555;
      padding: 15px;
      background-color: #1a1a1a;
      transition: 0.3s;
    }

    .skill:hover {
      transform: translateY(-5px);
    }

    .skill span {
      display: block;
      margin-bottom: 10px;
    }

    .skill.code { border-color: #ffb703; }
    .skill.design { border-color: #00f5d4; }

    .bar {
      height: 10px;
      background-color: #333;
      border: 1px solid #555;
    }

    .fill { height: 100%; }

    .level-1 { width: 20%; }
    .level-2 { width: 40%; }
    .level-3 { width: 60%; }
    .level-4 { width: 80%; }
    .level-5 { width: 100%; }

    .code .fill { background-color: #ffb703; }
    .design .fill { background-color: #00f5d4; }

    .legend {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <section class="container">
    <h1 class="title">> Skills_</h1>

    <div class="skills-grid">

      <div class="skill code">
        <span>Python</span>
        <div class="bar"><div class="fill level-4"></div></div>
      </div>

      <div class="skill code">
        <span>SQL</span>
        <div class="bar"><div class="fill level-4"></div></div>
      </div>

      <div class="skill design">
        <span>Photoshop</span>
        <div class="bar"><div class="fill level-4"></div></div>
      </div>

      <div class="skill design">
        <span>Procreate</span>
        <div class="bar"><div class="fill level-3"></div></div>
      </div>

      <div class="skill design">
        <span>After Effects</span>
        <div class="bar"><div class="fill level-3"></div></div>
      </div>

      <div class="skill design">
        <span>Canva</span>
        <div class="bar"><div class="fill level-5"></div></div>
      </div>

    </div>

    <p class="legend">
      [■ = proficiency level • amber = code • teal = design]
    </p>
  </section>

</body>
</html>
